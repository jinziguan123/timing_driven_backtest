# 注意：这是“站点配置”(server block)，适用于：
# - Docker 官方 nginx 镜像的 /etc/nginx/conf.d/default.conf
# - 或者你自己的主配置 /etc/nginx/nginx.conf 在 http {} 里 include 了 conf.d/*.conf
# 如果你把本文件直接放到 /etc/nginx/nginx.conf（主配置）会报错："server directive is not allowed here"

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 前端静态资源
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA（React Router / Vite）history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反代
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
